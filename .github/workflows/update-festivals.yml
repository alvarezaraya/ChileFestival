name: Update festivals feed

on:
  schedule:
    - cron: "0 12 * * 1"        # lunes 12:00 UTC (~08:00 en Chile)
  workflow_dispatch:            # permite correrlo a mano

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # NOTA: scripts/scrape_festivals.py son STUBS. Correrlo aquí sobrescribiría
      # el feed curado con carteles incompletos, así que NO está en el cron. Wirea
      # los scrapers reales y agrégalo antes del resolver cuando estén listos.

      - name: Resolver IDs y fotos de Apple Music (sin token)
        run: python scripts/resolve_artist_images.py festivals.json

      - name: Sincronizar copia del bundle
        run: cp festivals.json Festival/festivals.json

      - name: Commit si hay cambios
        run: |
          git config user.name "festival-bot"
          git config user.email "bot@users.noreply.github.com"
          if git diff --quiet HEAD -- festivals.json Festival/festivals.json; then
            echo "Sin cambios."
          else
            git add festivals.json Festival/festivals.json
            git commit -m "chore: refrescar IDs y fotos de Apple Music ($(date -u +%F))"
            git push
          fi
